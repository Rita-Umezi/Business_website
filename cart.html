<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Ray's Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="favicon replacement.png" type="image/png">
    <link rel="icon" href="favicon replacement.png" sizes="32x32" type="image/png">
    <link rel="icon" href="favicon replacement.png" sizes="64x64" type="image/png">
    <link rel="apple-touch-icon" href="favicon replacement.png" sizes="180x180">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/25c990c666.js" crossorigin="anonymous"></script>
    <script src="productsData.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="fixed w-full z-50 glass border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="serif text-2xl font-bold text-orange-600">Ray's Kitchen</div>
            
            <div class="flex items-center space-x-4">
                <ul class="hidden md:flex space-x-8 font-semibold text-sm uppercase tracking-widest items-center">
                    <li><a href="index.html" class="hover:text-orange-500 transition">Home</a></li>
                    <li><a href="index.html#menu" class="hover:text-orange-500 transition">Menu</a></li>
                    <li><a href="Health page.html" class="hover:text-orange-500 transition">Health</a></li>
                </ul>
                <a href="index.html" class="bg-orange-600 text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg shadow-orange-600/20 hover:bg-orange-700 transition-all active:scale-95 flex items-center gap-2">
                    <i class="fa-solid fa-house"></i> <span class="hidden sm:inline">Back to Home</span><span class="sm:hidden">Home</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
                <div>
                    <h1 class="serif text-5xl mb-2">Shopping Cart</h1>
                    <p class="text-slate-500">Review your wholesome selection before checkout.</p>
                </div>
                <button id="clear-cart" class="text-red-500 hover:text-red-700 text-sm font-bold flex items-center gap-2 transition">
                    <i class="fa-solid fa-trash-can"></i> Clear All
                </button>
            </div>

            <div id="cart-items" class="bg-white rounded-[2rem] shadow-xl shadow-orange-900/5 overflow-hidden p-8 mb-8 space-y-6">
                <!-- Items will be injected here -->
            </div>

            <!-- Customer Details Form -->
            <div class="bg-white rounded-3xl shadow-lg p-8 mb-8">
                <h3 class="serif text-2xl font-bold mb-6 text-orange-600 border-b pb-2">Delivery Details</h3>
                <form id="checkoutForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                        <input type="text" id="customerName" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                        <input type="tel" id="customerPhone" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <input type="email" id="customerEmail" required class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Delivery Address (Asaba only)</label>
                        <textarea id="deliveryAddress" required rows="2" class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition outline-none"></textarea>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-3xl shadow-lg p-8">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xl font-bold">Total Amount:</span>
                    <span class="text-3xl font-black text-orange-600 italic">₦<span id="total">0</span></span>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <a href="index.html" class="flex items-center justify-center gap-2 border-2 border-slate-200 py-4 rounded-full font-bold hover:bg-slate-50 transition">
                        <i class="fa-solid fa-arrow-left"></i> Continue Shopping
                    </a>
                    <button id="payButton" class="bg-orange-600 text-white py-4 rounded-full font-bold shadow-lg shadow-orange-600/30 hover:bg-orange-700 transition flex items-center justify-center gap-3">
                        Secure Checkout <i class="fa-solid fa-lock"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-white/50 py-8 text-center text-xs tracking-widest">
        &copy; 2026 Ray's Kitchen Ltd. All rights reserved.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const itemsDiv = document.getElementById('cart-items');
            const totalEl = document.getElementById('total');
            const clearBtn = document.getElementById('clear-cart');
            const payButton = document.getElementById('payButton');

            function getCart() {
                try { return JSON.parse(localStorage.getItem('cart')) || []; }
                catch (e) { localStorage.removeItem('cart'); return []; }
            }

            function saveCart(cart) {
                localStorage.setItem('cart', JSON.stringify(cart));
            }

            function renderCart() {
                let cart = getCart();
                
                // DATA CLEANUP: Remove any items that are completely invalid
                const validCart = cart.filter(item => (item.id || item.product));
                if (validCart.length !== cart.length) {
                    saveCart(validCart);
                    cart = validCart;
                }

                itemsDiv.innerHTML = '';

                if (cart.length === 0) {
                    itemsDiv.innerHTML = `
                        <div class="text-center py-12">
                            <i class="fa-solid fa-basket-shopping text-6xl text-slate-200 mb-4 block"></i>
                            <p class="text-slate-400 font-bold">Your cart is currently empty.</p>
                        </div>`;
                    totalEl.textContent = '0';
                    return;
                }

                // GROUPING LOGIC: Count quantities of same items
                const groupedCart = cart.reduce((acc, item) => {
                    const key = item.id || item.product || 'unknown';
                    if (!acc[key]) {
                        acc[key] = { 
                            id: item.id || '', 
                            product: item.product || 'Unknown Item', 
                            price: Number(item.price) || 0, 
                            quantity: 1 
                        };
                    } else {
                        acc[key].quantity += 1;
                    }
                    return acc;
                }, {});

                let total = 0;

                Object.values(groupedCart).forEach((item) => {
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    
                    // Look up product in static data for reliable info
                    let productInfo = null;
                    if (window.products && item.id) {
                        productInfo = window.products.find(p => p._id === String(item.id));
                    } 
                    
                    if (!productInfo && window.products && item.product) {
                        // Fallback search by name
                        productInfo = window.products.find(p => 
                            p.name.toLowerCase().trim() === item.product.toLowerCase().trim()
                        );
                    }

                    const imgPath = productInfo ? productInfo.image : 'placeholder.png';
                    const displayName = productInfo ? productInfo.name : item.product;

                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-4 md:gap-8 pb-6 border-b border-slate-100 last:border-0 last:pb-0';
                    row.innerHTML = `
                        <img src="${imgPath}" class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-2xl shadow-sm" alt="${displayName}" onerror="this.src='shopping-cart.png'">
                        <div class="flex-grow">
                            <h3 class="font-bold text-lg leading-tight capitalize">${displayName || 'Unknown Item'}</h3>
                            <p class="text-orange-600 font-bold">₦${item.price.toLocaleString()}</p>
                            <div class="mt-2 text-xs text-slate-400 font-bold uppercase tracking-widest">Qty: ${item.quantity}</div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <span class="font-black text-slate-800">₦${subtotal.toLocaleString()}</span>
                            <button class="remove text-xs text-red-400 hover:text-red-600 font-bold transition uppercase tracking-tighter" 
                                    data-id="${item.id}" data-name="${item.product}">
                                <i class="fa-solid fa-xmark"></i> Remove
                            </button>
                        </div>`;
                    itemsDiv.appendChild(row);
                });

                totalEl.textContent = total.toLocaleString();
            }

            // REMOVE ITEM BY ID OR NAME
            itemsDiv.addEventListener('click', (e) => {
                const removeBtn = e.target.closest('.remove');
                if (!removeBtn) return;
                
                const productId = removeBtn.dataset.id;
                const productName = removeBtn.dataset.name;
                let cart = getCart();
                
                // Find index of first match and remove it
                const index = cart.findIndex(item => {
                    if (productId && item.id === productId) return true;
                    if (productName && item.product === productName) return true;
                    return false;
                });
                
                if (index > -1) {
                    cart.splice(index, 1);
                    saveCart(cart);
                    renderCart();
                }
            });

            clearBtn.addEventListener('click', () => {
                if(confirm("Are you sure you want to clear your cart?")) {
                    localStorage.removeItem('cart');
                    localStorage.clear(); // Extra measure to ensure everything is wiped
                    renderCart();
                }
            });

            // Connect checkout to backend
            payButton.addEventListener('click', async () => {
                const cart = getCart();
                if(cart.length === 0) return alert("Your cart is empty!");

                const form = document.getElementById('checkoutForm');
                if(!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                // Prepare cart items (convert old frontend format to new backend format if needed. 
                // Note: The UI now uses MongoDB IDs, but previously used strings. 
                // We'll trust the ID stored in `item.product` if updated properly in index.html.)
                const groupedCart = cart.reduce((acc, item) => {
                    const key = item.id; // Expect index.html to store id now
                    if (!acc[key]) {
                        acc[key] = { productId: item.id, quantity: 1 };
                    } else {
                        acc[key].quantity += 1;
                    }
                    return acc;
                }, {});

                const orderData = {
                    customerName: document.getElementById('customerName').value,
                    phone: document.getElementById('customerPhone').value,
                    email: document.getElementById('customerEmail').value,
                    deliveryAddress: document.getElementById('deliveryAddress').value,
                    cartItems: Object.values(groupedCart),
                    guestId: localStorage.getItem('guestId')
                };

                payButton.disabled = true;
                payButton.innerHTML = 'Processing... <i class="fa-solid fa-spinner fa-spin"></i>';

                try {
                    const response = await fetch('/api/orders/checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(orderData)
                    });

                    const result = await response.json();

                    if(result.success) {
                        // Redirect to Paystack
                        window.location.href = result.authorization_url;
                    } else {
                        alert(`Checkout failed: ${result.message}`);
                        payButton.disabled = false;
                        payButton.innerHTML = 'Secure Checkout <i class="fa-solid fa-lock"></i>';
                    }
                } catch(error) {
                    console.error('Checkout error:', error);
                    alert("An error occurred during checkout. Please try again.");
                    payButton.disabled = false;
                    payButton.innerHTML = 'Secure Checkout <i class="fa-solid fa-lock"></i>';
                }
            });

            renderCart();
        });
    </script>
</body>
</html>
